<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magician Deck - Solo Combo Practice</title>
    <style>
        :root {
            --ygopro-bg: #050505;
            --field-border: rgba(0, 255, 255, 0.2);
            --card-gold: #ffd700;
            --primary: #8a2be2;
            --panel-bg: rgba(20, 20, 25, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--ygopro-bg);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* UI Panels */
        #card-detail {
            width: 280px; background: var(--panel-bg);
            border-right: 1px solid #333; padding: 15px;
            display: flex; flex-direction: column;
        }

        #preview-img {
            width: 100%; height: 350px; background: #111;
            border: 2px solid var(--card-gold); margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
        }

        #duel-field {
            flex: 1; display: flex; flex-direction: column;
            background: radial-gradient(circle, #1a1a2e 0%, #050505 100%);
            position: relative;
        }

        /* Field Grid */
        #grid {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 15px;
        }

        .row { display: flex; gap: 12px; }

        .zone {
            width: 75px; height: 110px; border: 1px solid var(--field-border);
            border-radius: 4px; position: relative;
            background: rgba(255,255,255,0.01);
            display: flex; align-items: center; justify-content: center;
        }

        .zone.scale { border-color: var(--primary); background: rgba(138, 43, 226, 0.05); }

        /* Card Visuals */
        .card {
            width: 70px; height: 105px; border-radius: 3px;
            cursor: pointer; position: relative; transition: transform 0.2s;
            background-size: cover; background-position: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .card.magician { background-color: #4b0082; border: 1px solid var(--card-gold); }
        .card.spell { background-color: #006400; border: 1px solid #00ff00; }
        
        .card-label {
            position: absolute; bottom: 2px; left: 0; width: 100%;
            font-size: 0.6rem; text-align: center; background: rgba(0,0,0,0.7);
        }

        /* Hand */
        #hand {
            height: 140px; display: flex; justify-content: center;
            align-items: flex-end; padding-bottom: 20px; gap: 10px;
        }

        /* Right Side: Log & Actions */
        #sidebar {
            width: 220px; background: var(--panel-bg);
            border-left: 1px solid #333; display: flex; flex-direction: column;
        }

        #log {
            flex: 1; padding: 10px; font-size: 0.8rem;
            overflow-y: auto; color: #aaa; border-bottom: 1px solid #333;
        }

        .btn-group { padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        button {
            padding: 10px; background: #333; color: white; border: none;
            cursor: pointer; border-radius: 4px; transition: 0.2s;
        }
        button:hover { background: var(--primary); }
        button.reset { background: #8b0000; }

        /* Menu Overlay */
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .menu-box { background: #222; padding: 20px; border-radius: 8px; min-width: 200px; }
        .menu-btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; text-align: left; }
    </style>
</head>
<body>

<aside id="card-detail">
    <div id="preview-img">Preview</div>
    <h3 id="det-name" style="color: var(--card-gold); margin: 5px 0;">Select a card</h3>
    <div id="det-stats" style="font-size: 0.9rem; margin-bottom: 10px;">-</div>
    <div id="det-desc" style="font-size: 0.8rem; color: #ccc; flex: 1; overflow-y: auto;">
        마술사 덱 전개 연습을 시작하려면 'Reset/Start' 버튼을 누르세요.
    </div>
</aside>

<main id="duel-field">
    <div id="grid">
        <!-- Opponent (Hidden) -->
        <div class="row" style="opacity: 0.3;">
            <div class="zone"></div><div class="zone"></div><div class="zone"></div><div class="zone"></div><div class="zone"></div>
        </div>
        <!-- Extra Monster Zones -->
        <div class="row">
            <div style="width: 80px;"></div>
            <div class="zone" id="ez-1"></div>
            <div style="width: 80px;"></div>
            <div class="zone" id="ez-2"></div>
            <div style="width: 80px;"></div>
        </div>
        <!-- Player Monster Zones -->
        <div class="row">
            <div class="zone" id="mz-0"></div><div class="zone" id="mz-1"></div><div class="zone" id="mz-2"></div><div class="zone" id="mz-3"></div><div class="zone" id="mz-4"></div>
        </div>
        <!-- Player S/T Zones (0 and 4 are Scales) -->
        <div class="row">
            <div class="zone scale" id="sz-0">L-Scale</div>
            <div class="zone" id="sz-1"></div>
            <div class="zone" id="sz-2"></div>
            <div class="zone" id="sz-3"></div>
            <div class="zone scale" id="sz-4">R-Scale</div>
        </div>
    </div>
    <div id="hand"></div>
</main>

<aside id="sidebar">
    <div id="log"></div>
    <div class="btn-group">
        <button onclick="initGame()" class="reset">Reset / Start</button>
        <button onclick="drawCard()">Draw Card</button>
    </div>
</aside>

<div id="menu-overlay">
    <div class="menu-box" id="menu-content"></div>
</div>

<script>
    const CARD_DATA = {
        'wisdom': { name: '혜안의 마술사', type: 'magician', atk: 1500, def: 1500, desc: 'P효과: 반대편에 마술사가 있으면 자신을 파괴하고 덱에서 다른 마술사를 세팅한다.' },
        'iris': { name: '홍채의 마술사', type: 'magician', atk: 1500, def: 1000, desc: 'P효과: 파괴 시 펜듈럼그래프 서치. 몬스터효과: 전투 데미지 2배.' },
        'harmonizing': { name: '조현의 마술사', type: 'magician', atk: 0, def: 0, desc: '몬스터효과: P소환 성공 시 덱에서 마술사 1장을 특수 소환한다.' },
        'astro': { name: '아스트로그래프', type: 'magician', atk: 2500, def: 2000, desc: '몬스터효과: 필드의 카드가 파괴되면 패에서 특수 소환하고, 파괴된 카드와 같은 이름의 카드를 서치한다.' },
        'joker': { name: '도쿠로배트 조커', type: 'magician', atk: 1800, def: 100, desc: '몬스터효과: 일반 소환 시 덱에서 마술사/EM/룡검사 1장을 서치한다.' },
        'pend-adv': { name: '듀얼리스트 어드밴트', type: 'spell', desc: '효과: 덱에서 펜듈럼이라 이름 붙은 카드를 서치한다.' }
    };

    let deck = [];
    let hand = [];
    let field = { mz: [null,null,null,null,null], sz: [null,null,null,null,null] };

    function initGame() {
        deck = [];
        hand = [];
        field = { mz: [null,null,null,null,null], sz: [null,null,null,null,null] };
        
        // Build Deck (Simplified)
        for(let i=0; i<3; i++) deck.push('wisdom', 'iris', 'harmonizing', 'joker', 'pend-adv');
        deck.push('astro');
        shuffle(deck);

        // Initial Draw
        for(let i=0; i<5; i++) drawCard();
        
        updateUI();
        addLog("Game Reset. Practice starts now!");
    }

    function shuffle(array) {
        array.sort(() => Math.random() - 0.5);
    }

    function drawCard() {
        if(deck.length > 0) {
            const cardKey = deck.pop();
            hand.push({ id: Date.now() + Math.random(), key: cardKey });
            updateUI();
        }
    }

    function updateUI() {
        const handEl = document.getElementById('hand');
        handEl.innerHTML = '';
        hand.forEach(c => {
            const card = createCardEl(c.key);
            card.onclick = () => showHandMenu(c);
            handEl.appendChild(card);
        });

        // Field Update
        for(let i=0; i<5; i++) {
            updateZone('mz', i);
            updateZone('sz', i);
        }
    }

    function createCardEl(key) {
        const data = CARD_DATA[key];
        const el = document.createElement('div');
        el.className = `card ${data.type}`;
        el.innerHTML = `<div class="card-label">${data.name}</div>`;
        el.onmouseenter = () => showDetail(key);
        return el;
    }

    function updateZone(type, idx) {
        const zone = document.getElementById(`${type}-${idx}`);
        zone.innerHTML = type === 'sz' && (idx === 0 || idx === 4) ? (idx === 0 ? 'L' : 'R') : '';
        if(field[type][idx]) {
            const card = createCardEl(field[type][idx].key);
            card.onclick = () => showFieldMenu(type, idx);
            zone.appendChild(card);
        }
    }

    function showDetail(key) {
        const data = CARD_DATA[key];
        document.getElementById('det-name').innerText = data.name;
        document.getElementById('det-stats').innerText = data.atk !== undefined ? `ATK / ${data.atk} DEF / ${data.def}` : 'Magic Card';
        document.getElementById('det-desc').innerText = data.desc;
    }

    function showHandMenu(cardObj) {
        const menu = document.getElementById('menu-content');
        menu.innerHTML = `<h3>${CARD_DATA[cardObj.key].name}</h3>`;
        
        if(CARD_DATA[cardObj.key].type === 'magician') {
            menu.innerHTML += `<button class="menu-btn" onclick="playCard('mz', '${cardObj.id}')">Monster Summon</button>`;
            menu.innerHTML += `<button class="menu-btn" onclick="playCard('sz', '${cardObj.id}')">Set Scale / S/T Zone</button>`;
        } else {
            menu.innerHTML += `<button class="menu-btn" onclick="activateSpell('${cardObj.id}')">Activate</button>`;
        }
        menu.innerHTML += `<button class="menu-btn" onclick="closeMenu()">Cancel</button>`;
        document.getElementById('menu-overlay').style.display = 'flex';
    }

    function playCard(type, cardId) {
        const cardIdx = hand.findIndex(c => c.id == cardId);
        const card = hand[cardIdx];
        
        // Find empty zone
        const zoneIdx = field[type].findIndex(z => z === null);
        if(zoneIdx !== -1) {
            field[type][zoneIdx] = card;
            hand.splice(cardIdx, 1);
            addLog(`${CARD_DATA[card.key].name} played to ${type.toUpperCase()} Zone ${zoneIdx}`);
        } else {
            alert("No empty zone!");
        }
        closeMenu();
        updateUI();
    }

    function showFieldMenu(type, idx) {
        const card = field[type][idx];
        const menu = document.getElementById('menu-content');
        menu.innerHTML = `<h3>${CARD_DATA[card.key].name}</h3>`;
        menu.innerHTML += `<button class="menu-btn" onclick="activateEffect('${type}', ${idx})">Activate Effect</button>`;
        menu.innerHTML += `<button class="menu-btn" onclick="destroyCard('${type}', ${idx})">Destroy</button>`;
        menu.innerHTML += `<button class="menu-btn" onclick="closeMenu()">Cancel</button>`;
        document.getElementById('menu-overlay').style.display = 'flex';
    }

    function activateEffect(type, idx) {
        const card = field[type][idx];
        addLog(`${CARD_DATA[card.key].name} effect activated!`);
        
        // Special Logic: Wisdom-Eye
        if(card.key === 'wisdom' && type === 'sz') {
            addLog("Wisdom-Eye effect: Search and Set new scale.");
            destroyCard(type, idx, true);
            // Auto-set Iris as replacement (Simplified)
            const newCard = { id: Date.now(), key: 'iris' };
            field[type][idx] = newCard;
        }
        
        closeMenu();
        updateUI();
    }

    function destroyCard(type, idx, silent = false) {
        const card = field[type][idx];
        if(!silent) addLog(`${CARD_DATA[card.key].name} was destroyed.`);
        field[type][idx] = null;
        
        // Check for Astrograph in hand
        const astroInHand = hand.find(c => c.key === 'astro');
        if(astroInHand) {
            if(confirm("Trigger Astrograph in hand?")) {
                playCard('mz', astroInHand.id);
                addLog("Astrograph Special Summoned!");
            }
        }
        
        closeMenu();
        updateUI();
    }

    function closeMenu() { document.getElementById('menu-overlay').style.display = 'none'; }
    function addLog(msg) {
        const log = document.getElementById('log');
        const entry = document.createElement('div');
        entry.style.marginBottom = '5px';
        entry.innerText = `> ${msg}`;
        log.prepend(entry);
    }

    // Start
    initGame();
</script>

</body>
</html>
